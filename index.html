<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="java.css">
    <title> welcome to zikora's to do list</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My To-Do List</h1>
            <p id="taskCount">0 tasks</p>
        </div>
       
        <div class="inner-container">
            <input id="taskInput" type="text" placeholder="Add a new task...">
            <button id="addBtn">Add Task</button>
        </div>
        <div class="filters">
            <button id="filterAll" class="filter-btn active">All</button>
            <button id="filterActive" class="filter-btn">Active</button>
            <button id="filterCompleted" class="filter-btn">Completed</button>
            <button id="clearAllBtn">Clear All</button>
        </div>
        <ul id="taskList"></ul>
    </div>

  <script src="java.js">
    
  </script>
    
</body>
</html>
